services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: moleben
      POSTGRES_PASSWORD: moleben
      POSTGRES_DB: moleben
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432" # опционально, можно убрать если доступ к БД с хоста не нужен
    healthcheck:
      # Проверяем именно юзером/БД moleben
      test: ["CMD-SHELL", "pg_isready -U moleben -d moleben -h localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DB_DSN: ${DB_DSN:-postgres://moleben:moleben@db:5432/moleben?sslmode=disable}
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
